<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisas</title>
</head>

<body>
    <h1>Neymar Skills</h1>
    <hr width="70%">
    <br>
    <video width="320" height="240" loop controls autoplay muted>
        <source src="https://videos.rockstargames.com/v4/16962ca8/flv/en-us-720p.mp4"></source>
    </video>
    <br><br><br>
    <iframe width="560" height="315" src="https://www.youtube.com/embed/UcLXIG3W7u4?si=aruid14dT6A9Z0yq" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
    <br><br><br>
    <table border="1">
        <caption>Tabela de profissões</caption>
        <thead>
            <tr>
                <th>Nome</th>
                <th>Idade</th>
                <th colspan="2">Profissões</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Luiz</td>
                <td rowspan="2">17</td>
                <td>Unifebe</td>
                <td>Mendigo</td>
            </tr>
            <tr>
                <td>Matheus</td>
                <td>BJNet</td>
                <td>ProPlayer de Fortnite</td>
            </tr>
        </tbody>
    </table>
    <br><br><br><br><br><br><br><br>

    <section>

        <h2>Formulários</h2>

        <form action="" method="get">
            <fieldset>
                <legend>Dados Pessoais</legend>

                <label for="nome">Nome:</label>
                <input id="nome" name="nome" type="text" required placeholder="Insira seu nome">

                <hr>

                <label for="email">Email</label>
                <input type="email" name="email" id="email" required placeholder="Insira seu email">

                <hr>

                <label for="estado">Selecione seu estado</label>
                <select name="estado" id="estado" required>
                    <option value="" selected disabled></option>
                    <option value="SC">Santa Catarina</option>
                    <option value="PR">Paraná</option>
                    <option value="RS">Rio Grande do Sul</option>      
                </select>

                <hr>

                <label for="comentario">Comentários</label>
                <textarea name="comentario" id="comentario" cols="30" rows="1"></textarea>
            </fieldset>

            <fieldset>
                <legend>Escolha de Gênero</legend>

                <input name="genero" type="radio" required>
                <label for="">Masculino</label>

                <input name="genero" type="radio" required>
                <label for="">Feminino</label>

                <input name="genero" type="radio" required>
                <label for="">Outros</label>
            </fieldset>

            <fieldset>
                <legend>Lista de Compras</legend>

                <input id="macarrao" name="macarrao" type="checkbox">
                <label for="">Macarrão</label>

                <br>

                <input id="placa" name="placa" type="checkbox">
                <label for="">Placa de Vídeo RTX 5090</label>

                <br>

                <input id="memoria" name="memoria" type="checkbox">
                <label for="">Memória RAM DDR6 32GB</label>
            </fieldset>

            <button type="submit">Enviar formulário</button>
        </form>

    </section>

</body>
</html>
